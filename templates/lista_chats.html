<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Mensajes</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #161b22; border-radius: 15px; border: 1px solid #30363d; overflow: hidden; }
        .header { padding: 20px; background: #0d1117; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        .chat-item { 
            display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #30363d; 
            text-decoration: none; color: white; transition: 0.2s;
        }
        .chat-item:hover { background: #21262d; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #30363d; margin-right: 15px; object-fit: cover; }
        .name { font-weight: bold; color: #00ff88; }
        .empty { padding: 40px; text-align: center; color: #8b949e; }
        .btn-back { color: #00ff88; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin:0;">Mensajes</h2>
            <a href="/foro/General" class="btn-back">Volver al Foro</a>
        </div>
        
        {% if salas %}
            {% for s in salas %}
            <a href="/chat/{{ s.usuario }}" class="chat-item">
                {% set u_info = usuarios_db.get(s.usuario) %}
                {% if u_info and u_info.avatar %}
                    <img src="{{ url_for('static', filename='uploads/' + u_info.avatar) }}" class="avatar">
                {% else %}
                    <div class="avatar" style="display:flex; align-items:center; justify-content:center; background:#444;">{{ s.usuario[0]|upper }}</div>
                {% endif %}
                <div class="name">@{{ s.usuario }}</div>
            </a>
            {% endfor %}
        {% else %}
            <div class="empty">No tienes chats activos todavía.</div>
        {% endif %}
    </div>

    <script>
        // Podrías añadir un refresco automático aquí en el futuro si lo deseas
    </script>
</body>
</html>
